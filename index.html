<!DOCTYPE html>
<html>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
    <title>Spotify.com</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<body>
    <div class="navbar">
        <i class="fa-brands fa-spotify"></i>
        <i class="fa-solid fa-house"></i>
        <div class="fullybox">
            <i id="srch icon" class="fa-solid fa-magnifying-glass"></i>
            <input  id="input_box" type="text" name="inputbox" placeholder=" what do you want to play?">
            <i id="brw_icon" class="fa-solid fa-window-restore"></i>
        </div>
      <div class="links">
        <a>Premium</a>
        <a>Support</a>
        <a>Download</a>
      </div>
      <div class="links">|</div>
      <div class="ins"><i class="fa-solid fa-download"></i>Install app</div>
      <div style="color: #bdb8b8;" class="sign">Sign up</div>

      <button id="login_btn">Log in</button>
    </div>
   <div class="container flex justify-center item-center">
    <div class="left bg_grey rounded">
        <div class="library">
            <div class="libr">
             <h3>Your Library</h3>
             <i  id="plus" class="fa-solid fa-plus"></i>
             </div>
             <div class="crt_playlist">
                <div class="first-part bg_darkgrey rounded padding margin">
                <h4>Creat your first playlist </h4>
            <p>it's esay we'll help you </p>
            <button id="playlistbtn">Create Playlist</button>
            </div>
            <div class="second-part bg_darkgrey rounded padding margin">
                <h4> Let's find some podcasts to follow</h4>
                <p>We'll keep you updated on new episodes</p>
                <button id="playlistbtn">Browse podcasts</button>
            </div>
             </div>
        </div>
        <div class="intro">
            <a href="https://www.spotify.com/in-en/legal/end-user-agreement/" target="_blank">Legal</a>
            <a href="https://www.spotify.com/in-en/legal/end-user-agreement/" target="_blank">Safety&Privacy Center</a>
            <a href="https://www.spotify.com/in-en/legal/end-user-agreement/" target="_blank">Privacy Policy</a>
            <a href="https://www.spotify.com/in-en/legal/end-user-agreement/" target="_blank">Cookies</a>
            <a href="https://www.spotify.com/in-en/legal/end-user-agreement/" target="_blank">About Ads</a>
            <a href="https://www.spotify.com/in-en/legal/end-user-agreement/" target="_blank">Accessibility</a>

        </div>
        <button class="lang"><i class="fa-solid fa-globe"></i>English</button>
    </div>
    <div class="right  bg_grey" >Songs box</div>
   </div>
</body>
